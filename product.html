<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="Shop this product on BuyerHub. View details, ratings, reviews, and add to cart for fast delivery.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Product Detail | BuyerHub">
  <meta property="og:description"
    content="Shop this product on BuyerHub. View details, ratings, reviews, and add to cart for fast delivery.">
  <meta property="og:url" content="https://www.buyerhub.com/product.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Product Detail | BuyerHub">
  <meta name="twitter:description"
    content="Shop this product on BuyerHub. View details, ratings, reviews, and add to cart for fast delivery.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>

<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <div id="breadcrumb"></div>
      <div class="row g-4 g-lg-6" id="productDetail"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage();
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id') || '1';
      var product = BH.products.find(function (p) { return p.id === id; }) || BH.products[0];

      document.getElementById('breadcrumb').innerHTML = BH.renderBreadcrumb([
        { label: 'Products', href: 'products.html' },
        { label: product.name }
      ]);

      var price = typeof product.price === 'number' ? product.price : (product.price && product.price.current) || 0;
      var originalPrice = product.price && product.price.original;
      var discount = product.price && product.price.discount;
      var imgSrc = Array.isArray(product.images) ? product.images[0] : (product.images && product.images.main) || '';
      var gallery = (product.images && product.images.gallery) || [imgSrc];
      var specs = product.specifications || {};
      var features = product.features || [];
      var shipping = product.shipping || {};
      var returns = product.returns || {};
      var warranty = product.warranty || {};
      var variants = product.variants || [];

      // Aggregate rating shown by both #ratingDisplay (top) and the
      // Product Rating card (bottom). Mirrors React's `displayReviews =
      // apiReviews || product?.reviews` (ProductDetailPage.tsx:62-63);
      // updated in place by the getProductRatings call below.
      var displayReviews = (product.reviews && product.reviews.total) ? product.reviews : null;

      // Resolve human-readable category name (React uses product.categoryName
      // directly; bootstrap data only stores categoryId).
      var categoryName = '';
      var catMatch = (BH.categories || []).find(function (c) { return c.id === product.categoryId; });
      if (catMatch) categoryName = catMatch.name;

      // Active tab id for the bottom details card (P0-B7). Mirrors React
      // `useState<string>("description")` in ProductDetailPage.tsx:68.
      var activeDetailTab = 'description';

      // Variant state. Mirrors React's useEffect that defaults selection to
      // the first option (src/pages/Products/ProductDetailPage.tsx:71-86).
      // Closure variables; exposed via window.* so inline onclick handlers
      // and (later) addToCart can read them. P0-B2 will populate selectedSize.
      var colorVariant = variants.find(function (v) { return v.type === 'color'; }) || null;
      var sizeVariant = variants.find(function (v) { return v.type === 'size'; }) || null;
      var selectedColor = colorVariant && colorVariant.options.length ? colorVariant.options[0].id : '';
      var selectedSize = sizeVariant && sizeVariant.options.length ? sizeVariant.options[0].id : '';

      function renderColorSwatches() {
        if (!colorVariant) return '';
        var swatches = colorVariant.options.map(function (opt) {
          var active = opt.id === selectedColor ? ' active' : '';
          var disabled = opt.inStock === false ? ' disabled' : '';
          return '<button type="button"' +
            ' class="bh-color-swatch' + active + '"' +
            ' style="background-color:' + (opt.hex || '#ccc') + '"' +
            ' data-color-id="' + opt.id + '"' +
            ' aria-label="' + (opt.name || opt.id) + '"' +
            ' aria-pressed="' + (opt.id === selectedColor ? 'true' : 'false') + '"' +
            ' title="' + (opt.name || opt.id) + '"' +
            ' onclick="selectColor(\'' + opt.id + '\')"' +
            disabled + '></button>';
        }).join('');
        return '<div class="bh-variant-section">' +
          '<h3 class="bh-variant-label">Colours:</h3>' +
          '<div class="bh-color-swatches">' + swatches + '</div>' +
          '</div>';
      }

      // Vendor storefront link (P0-B4). Mirrors React's seller block in
      // ProductDetailPage.tsx:309-367. Bootstrap's BH.sellers also exposes
      // rating + location + verified, which we surface in the meta line.
      function renderVendorBlock() {
        var seller = BH.sellers.find(function (s) { return s.id === product.sellerId; });
        if (!seller) return '';
        var initial = (seller.name || 'B').charAt(0).toUpperCase();
        var avatar = seller.logo
          ? '<div class="bh-vendor-avatar"><img src="' + seller.logo + '" alt="' + seller.name + '"></div>'
          : '<div class="bh-vendor-avatar" aria-hidden="true">' + initial + '</div>';
        var verified = seller.verified
          ? ' <i class="bi bi-patch-check-fill text-primary" title="Verified vendor" aria-label="Verified vendor" style="font-size:0.875rem"></i>'
          : '';
        var rating = (typeof seller.rating === 'number')
          ? '<i class="bi bi-star-fill" aria-hidden="true"></i><span>' + seller.rating.toFixed(1) + '</span>'
          : '';
        var sep = (rating && seller.location) ? '<span aria-hidden="true">·</span>' : '';
        var location = seller.location ? '<span>' + seller.location + '</span>' : '';
        return '<a class="bh-vendor-link mb-2" href="vendor.html?id=' + encodeURIComponent(seller.id) + '"' +
          ' aria-label="Visit ' + seller.name + ' storefront">' +
          avatar +
          '<div class="bh-vendor-info">' +
          '<div class="bh-vendor-name d-flex align-items-center">' + seller.name + verified + '</div>' +
          (rating || location ? '<div class="bh-vendor-meta">' + rating + sep + location + '</div>' : '') +
          '</div>' +
          '</a>';
      }

      // Stars + "(N reviews)" — extracted so the API-sourced ratings
      // (P0-B6) can swap it in once they resolve. Mirrors React's
      // `displayReviews = apiReviews || product?.reviews` pattern in
      // ProductDetailPage.tsx:62-63.
      function renderRatingRow(avg, total) {
        return BH.renderStars(avg || 0) +
          '<span class="text-sm text-muted">(' + (total || 0) + ' reviews)</span>';
      }

      // ---- Tabbed details (P0-B7). Mirrors React's three tabs in
      // ProductDetailPage.tsx:538-724 (Description / Features /
      // Shipping & Returns). The bootstrap-only Specifications data is
      // folded into the Description tab so we don't lose it.

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function renderDescriptionTab() {
        var html = '<div class="space-y-3">' +
          '<h3 class="fw-bold mb-3">Product Details</h3>' +
          '<p class="mb-3" style="white-space:pre-line;line-height:1.6">' + escapeHtml(product.description || '') + '</p>';
        if (product.brand || product.model || categoryName) {
          html += '<div class="pt-3 border-top">' +
            '<h6 class="fw-semibold mb-3">Product Information</h6>' +
            '<dl class="row mb-0 small text-muted">';
          if (product.brand) html += '<dt class="col-sm-4 fw-medium">Brand:</dt><dd class="col-sm-8 mb-2">' + escapeHtml(product.brand) + '</dd>';
          if (product.model) html += '<dt class="col-sm-4 fw-medium">Model:</dt><dd class="col-sm-8 mb-2">' + escapeHtml(product.model) + '</dd>';
          if (categoryName) html += '<dt class="col-sm-4 fw-medium">Category:</dt><dd class="col-sm-8 mb-2">' + escapeHtml(categoryName) + '</dd>';
          html += '</dl></div>';
        }
        var specKeys = Object.keys(specs);
        if (specKeys.length > 0) {
          html += '<div class="pt-3 border-top">' +
            '<h6 class="fw-semibold mb-3">Specifications</h6>' +
            '<dl class="row mb-0 small text-muted">';
          specKeys.forEach(function (k) {
            html += '<dt class="col-sm-4 fw-medium">' + escapeHtml(k) + ':</dt>' +
              '<dd class="col-sm-8 mb-2">' + escapeHtml(specs[k]) + '</dd>';
          });
          html += '</dl></div>';
        }
        html += '</div>';
        return html;
      }

      function renderFeaturesTab() {
        if (!features.length) {
          return '<p class="text-muted mb-0">No features listed for this product.</p>';
        }
        return '<ul class="list-unstyled mb-0">' +
          features.map(function (f) {
            return '<li class="d-flex align-items-start gap-2 mb-2">' +
              '<span class="rounded-circle flex-shrink-0" style="width:0.375rem;height:0.375rem;background:hsl(var(--primary));margin-top:0.6rem"></span>' +
              '<span>' + escapeHtml(f) + '</span>' +
              '</li>';
          }).join('') +
          '</ul>';
      }

      function renderShippingTab() {
        var dims = shipping.dimensions || {};
        var dimUnit = dims.unit || 'cm';
        var html = '<div>' +
          '<h6 class="fw-semibold mb-3 d-flex align-items-center gap-2">' +
          '<i class="bi bi-truck text-primary"></i>Shipping Information' +
          '</h6>' +
          '<p class="mb-3">We partner with trusted carriers like UPS and local couriers to deliver orders across your region and to select international destinations.</p>' +
          '<ul class="mb-3">' +
          '<li><span class="fw-medium">Local delivery:</span> Typically 1\u20133 business days after the vendor hands over your order.</li>' +
          '<li><span class="fw-medium">Other major cities:</span> Usually 2\u20137 business days (48 hours for eligible perishable items).</li>' +
          '<li><span class="fw-medium">Remote areas:</span> Around 7\u201314 business days from vendor dispatch.</li>' +
          '<li><span class="fw-medium">Diaspora shipments:</span> Estimated 7\u201321 business days, depending on customs.</li>' +
          '</ul>';
        if (shipping.freeShipping) {
          html += '<p><span class="badge text-bg-success">Free Shipping</span></p>';
        }
        if (shipping.weight != null) {
          html += '<p class="mb-2"><span class="fw-medium">Package weight:</span> ' + escapeHtml(shipping.weight) + ' ' + escapeHtml(dimUnit === 'cm' ? 'kg' : dimUnit) + '</p>';
        }
        if (dims.length || dims.width || dims.height) {
          html += '<p class="mb-2"><span class="fw-medium">Package dimensions:</span> ' +
            escapeHtml(dims.length || '?') + ' \u00d7 ' + escapeHtml(dims.width || '?') + ' \u00d7 ' + escapeHtml(dims.height || '?') + ' ' + escapeHtml(dimUnit) + '</p>';
        }
        if (shipping.shippingClass) {
          html += '<p class="mb-2"><span class="fw-medium">Shipping class:</span> ' + escapeHtml(shipping.shippingClass) + '</p>';
        }
        if (shipping.restrictions && shipping.restrictions.length) {
          html += '<div class="mb-2"><span class="fw-medium">Restrictions:</span><ul class="mb-0 mt-1">' +
            shipping.restrictions.map(function (r) { return '<li>' + escapeHtml(r) + '</li>'; }).join('') +
            '</ul></div>';
        }
        html += '<p class="mb-0"><span class="fw-medium">Delivery fees:</span> All fees and any applicable customs or taxes are clearly shown at checkout.</p>' +
          '</div>' +
          '<div class="pt-3 mt-3 border-top">' +
          '<h6 class="fw-semibold mb-3 d-flex align-items-center gap-2">' +
          '<i class="bi bi-arrow-counterclockwise text-primary"></i>Returns &amp; Warranty' +
          '</h6>';
        if (returns.returnable) {
          html += '<p class="mb-2"><span class="fw-medium">Returnable:</span> Most eligible items can be returned within our standard window.</p>' +
            '<p class="mb-2"><span class="fw-medium">Return period:</span> Typically ' + escapeHtml(returns.period || 30) + ' ' + escapeHtml(returns.unit || 'days') +
            ' from delivery, provided the item is unused, in original packaging, and with all tags/accessories intact.</p>';
          if (returns.free) {
            html += '<p class="mb-2"><span class="badge text-bg-success">Free Returns</span></p>';
          }
          if (returns.conditions && returns.conditions.length) {
            html += '<div class="mb-2"><span class="fw-medium">Return Conditions:</span><ul class="mb-0 mt-1">' +
              returns.conditions.map(function (c) { return '<li>' + escapeHtml(c) + '</li>'; }).join('') +
              '</ul></div>';
          }
        } else {
          html += '<p class="mb-2">This product is not returnable.</p>';
        }
        html += '<p class="mb-2"><span class="fw-medium">How to start a return:</span> Log into your account, go to your orders, and select "Return Item" within the allowed window.</p>';
        if (warranty && warranty.period) {
          html += '<p class="mb-2 pt-2 border-top"><span class="fw-medium">Warranty:</span> ' +
            escapeHtml(warranty.period) + ' ' + escapeHtml(warranty.unit || 'months') + ' (' + escapeHtml(warranty.type || 'manufacturer') + ')</p>';
        }
        html += '<div class="pt-3 mt-2 border-top">' +
          '<a class="btn btn-bh-outline-primary btn-sm" href="shipping.html">View full Shipping &amp; Return policy</a>' +
          '</div></div>';
        return html;
      }

      // Related products grid (P0-B8). Mirrors the filter logic of
      // React's filteredRelatedProducts useMemo
      // (ProductDetailPage.tsx:137-176):
      //   1. Exclude current product from candidates.
      //   2. Match by category (React uses product.categoryName; we use
      //      categoryId since they're 1:1 in bootstrap data) OR by
      //      having at least one tag in common (case-insensitive).
      //   3. If no matches found, fall back to same-categoryId only.
      //   4. Final fallback: any other products.
      //   5. Slice to the first 4.
      function getRelatedProducts() {
        var pool = BH.products || [];
        var candidates = pool.filter(function (p) { return p.id !== product.id; });
        if (!candidates.length) return [];

        var ownTags = (product.tags || []).map(function (t) { return String(t).toLowerCase(); });

        var matched = candidates.filter(function (p) {
          var catMatch = product.categoryId && p.categoryId &&
            product.categoryId === p.categoryId;
          var tagMatch = ownTags.length > 0 && p.tags && p.tags.length > 0 &&
            p.tags.some(function (t) { return ownTags.indexOf(String(t).toLowerCase()) !== -1; });
          return catMatch || tagMatch;
        });

        var finalList = matched.length
          ? matched
          : candidates.filter(function (p) { return p.categoryId === product.categoryId; });
        if (!finalList.length) finalList = candidates;
        return finalList.slice(0, 4);
      }

      function renderRelatedItems() {
        var related = getRelatedProducts();
        if (!related.length) return '';
        var cards = related.map(function (p) {
          return '<div class="col-6 col-sm-4 col-md-3">' + BH.renderProductCard(p) + '</div>';
        }).join('');
        return '<div class="col-12 mt-5">' +
          '<div class="d-flex align-items-center gap-3 mb-3">' +
          '<div class="rounded" style="width:0.5rem;height:1.75rem;background-color:hsl(var(--primary))" aria-hidden="true"></div>' +
          '<h2 class="fw-bold m-0">Related Items</h2>' +
          '</div>' +
          '<div class="row g-3 g-lg-4">' + cards + '</div>' +
          '</div>';
      }

      function renderRatingCard(reviews) {
        var html = '<h2 class="fw-bold mb-4">Product Rating</h2>';
        if (!reviews || !reviews.total) {
          html += '<div class="text-center py-4">' +
            '<div class="d-flex justify-content-center gap-1 mb-3" aria-hidden="true">' +
            new Array(5).fill('<i class="bi bi-star fs-3 text-muted"></i>').join('') +
            '</div>' +
            '<p class="text-muted mb-2">No ratings yet</p>' +
            '<p class="text-muted small mb-0">Be the first to rate this product after purchase.</p>' +
            '</div>';
        } else {
          var avg = Number(reviews.average) || 0;
          var total = Number(reviews.total) || 0;
          var breakdown = reviews.breakdown || {};
          html += '<div class="row g-4">' +
            '<div class="col-md-4 text-center border-end">' +
            '<div class="bh-rating-aggregate mb-2">' + avg.toFixed(1) + '</div>' +
            '<div class="d-flex justify-content-center mb-2">' + BH.renderStars(avg) + '</div>' +
            '<div class="small text-muted">' + total + ' rating' + (total !== 1 ? 's' : '') + '</div>' +
            '<p class="small text-muted mt-3 mb-0">Ratings from purchases</p>' +
            '</div>' +
            '<div class="col-md-8">';
          if (Object.keys(breakdown).length) {
            [5, 4, 3, 2, 1].forEach(function (n) {
              var count = Number(breakdown[n] || 0);
              var pct = total > 0 ? (count / total) * 100 : 0;
              html += '<div class="bh-rating-bar-row">' +
                '<span class="bh-rating-bar-label">' + n + ' star' + (n > 1 ? 's' : '') + '</span>' +
                '<div class="bh-rating-bar-track" role="progressbar" aria-valuenow="' + count + '" aria-valuemin="0" aria-valuemax="' + total + '">' +
                '<div class="bh-rating-bar-fill" style="width:' + pct + '%"></div>' +
                '</div>' +
                '<span class="bh-rating-bar-count">' + count + '</span>' +
                '</div>';
            });
          }
          html += '</div></div>';
        }
        html += '<div class="pt-3 mt-3 border-top">' +
          '<p class="small text-muted mb-3"><strong>Rate this product:</strong> After purchasing and receiving this item, you can rate and review your experience in your order history.</p>';
        if (BH.Auth && BH.Auth.isAuthenticated()) {
          html += '<a class="btn btn-bh-outline-primary btn-sm" href="orders.html">View My Orders</a>';
        }
        html += '</div>';
        return html;
      }

      function renderSizeOptions() {
        if (!sizeVariant) return '';
        var pills = sizeVariant.options.map(function (opt) {
          var active = opt.id === selectedSize ? ' active' : '';
          var disabled = opt.inStock === false ? ' disabled' : '';
          var label = opt.value ? String(opt.value).toUpperCase() : (opt.name || opt.id);
          return '<button type="button"' +
            ' class="bh-size-option' + active + '"' +
            ' data-size-id="' + opt.id + '"' +
            ' aria-pressed="' + (opt.id === selectedSize ? 'true' : 'false') + '"' +
            ' title="' + (opt.name || opt.id) + '"' +
            ' onclick="selectSize(\'' + opt.id + '\')"' +
            disabled + '>' + label + '</button>';
        }).join('');
        return '<div class="bh-variant-section">' +
          '<h3 class="bh-variant-label">Size:</h3>' +
          '<div class="bh-size-options">' + pills + '</div>' +
          '</div>';
      }

      var detail = document.getElementById('productDetail');
      detail.innerHTML = '\
      <div class="col-12 col-lg-6">\
        <div class="bh-card p-2 mb-3 position-relative">' +
        (discount && discount.percentage > 0
          ? '<div class="bh-bottlecap" aria-label="' + Math.round(discount.percentage) + ' percent off">' +
          '<div class="bh-bottlecap-text">' +
          '<span class="bh-bottlecap-pct">-' + Math.round(discount.percentage) + '%</span>' +
          '<span class="bh-bottlecap-off">OFF</span>' +
          '</div>' +
          '</div>'
          : '') + '\
          <img id="mainImage" src="'+ gallery[0] + '" alt="' + (product.images && product.images.alt || '') + '" class="w-100 rounded" style="aspect-ratio:1;object-fit:contain">\
        </div>\
        <div class="d-flex gap-2 overflow-auto">' +
        gallery.map(function (img, i) {
          return '<div class="bh-card p-1 flex-shrink-0" style="width:72px;height:72px;cursor:pointer" onclick="document.getElementById(\'mainImage\').src=\'' + img + '\'"><img src="' + img + '" class="w-100 h-100 rounded" style="object-fit:contain"></div>';
        }).join('') + '\
        </div>\
      </div>\
      <div class="col-12 col-lg-6">\
        <h1 class="fw-bold fs-4 fs-lg-5 mb-2">'+ product.name + '</h1>' +
        renderVendorBlock() + '\
        <div id="ratingDisplay" class="d-flex align-items-center gap-2 mb-3">' +
        renderRatingRow(product.reviews && product.reviews.average || 0, product.reviews && product.reviews.total || 0) + '\
        </div>\
        <div class="d-flex align-items-center gap-3 mb-3">\
          <span class="fs-4 fw-bold" style="color:hsl(var(--destructive))">'+ BH.formatPrice(price) + '</span>' +
        (originalPrice && originalPrice > price ? '<span class="text-muted text-decoration-line-through">' + BH.formatPrice(originalPrice) + '</span>' : '') + '\
        </div>\
        <p class="text-sm mb-3" style="color:hsl(var(--muted-foreground))">'+ (product.description || '') + '</p>' +
        renderColorSwatches() +
        renderSizeOptions() + '\
        <div class="d-flex flex-wrap gap-2 mb-3">\
          <div class="input-group" style="max-width:140px">\
            <button class="btn btn-outline-secondary" onclick="updateQty(-1)" aria-label="Decrease quantity">-</button>\
            <input type="number" id="qty" value="1" min="1" class="form-control text-center bh-form-control" aria-label="Quantity">\
            <button class="btn btn-outline-secondary" onclick="updateQty(1)" aria-label="Increase quantity">+</button>\
          </div>\
          <button class="btn btn-bh-outline-primary flex-grow-1" onclick="addToCart()"><i class="bi bi-cart3 me-2"></i>Add To Cart</button>\
          <button class="btn btn-bh-primary flex-grow-1" onclick="buyNow()">Buy Now</button>\
          <button class="btn btn-outline-secondary" onclick="BH.toggleWishlist(\''+ product.id + '\')" aria-label="Toggle wishlist"><i class="bi bi-heart' + (BH.Wishlist.isItemInWishlist(product.id) ? '-fill text-danger' : '') + '"></i></button>\
        </div>\
      </div>\
      <div class="col-12 col-lg-6 mt-4">\
        <div class="bh-card overflow-hidden" id="detailsCard">\
          <div class="bh-tabs" role="tablist">\
            <button type="button" class="bh-tab-button active" data-tab-id="description" role="tab" aria-selected="true" aria-controls="tabpane-description" onclick="selectDetailTab(\'description\')">Description</button>\
            <button type="button" class="bh-tab-button" data-tab-id="features" role="tab" aria-selected="false" aria-controls="tabpane-features" onclick="selectDetailTab(\'features\')">Features</button>\
            <button type="button" class="bh-tab-button" data-tab-id="shipping" role="tab" aria-selected="false" aria-controls="tabpane-shipping" onclick="selectDetailTab(\'shipping\')">Shipping &amp; Returns</button>\
          </div>\
          <div class="bh-tab-pane" id="tabpane-description" role="tabpanel">' + renderDescriptionTab() + '</div>\
          <div class="bh-tab-pane" id="tabpane-features" role="tabpanel" hidden>' + renderFeaturesTab() + '</div>\
          <div class="bh-tab-pane" id="tabpane-shipping" role="tabpanel" hidden>' + renderShippingTab() + '</div>\
        </div>\
      </div>\
      <div class="col-12 col-lg-6 mt-4">\
        <div class="bh-card p-4 h-100" id="ratingCard">' + renderRatingCard(displayReviews) + '</div>\
      </div>' +
        renderRelatedItems() +
        // Recently Viewed section (P0-B9). Placeholder; populated async
        // by the getRecentlyViewed call below. Hidden until items load.
        '<div id="recentlyViewedSection" class="col-12 mt-5 pt-4 border-top" hidden>\
        <div class="mb-3">\
          <h2 class="fw-bold m-0">Recently Viewed</h2>\
          <p class="text-muted mb-0">Your recently viewed items are waiting</p>\
        </div>\
        <div class="row g-3 g-lg-4" id="recentlyViewedGrid"></div>\
      </div>';

      // Fetch API-sourced ratings (P0-B6). Mirrors React's
      // useProductRatings(id) hook (src/hooks/api/useProductRatings.ts)
      // and the `displayReviews = apiReviews || product?.reviews`
      // selection on ProductDetailPage.tsx:62-63. We render the
      // fallback (product.reviews) immediately above; this call swaps
      // the row AND the Product Rating card (P0-B7) to the live values
      // when the API resolves. Errors are logged but silently keep the
      // fallback in place.
      if (BH.api && BH.api.products && typeof BH.api.products.getProductRatings === 'function') {
        BH.api.products.getProductRatings(product.id).then(function (res) {
          var data = res && res.data;
          if (!data) return;
          var avg = parseFloat(data.totalRating);
          var count = parseInt(data.ratingCount, 10);
          if (isNaN(avg) || isNaN(count) || count <= 0) return;
          // Preserve any existing breakdown (the API response only has
          // aggregate values; the breakdown comes from product.reviews).
          displayReviews = {
            average: avg,
            total: count,
            breakdown: (product.reviews && product.reviews.breakdown) || null,
          };
          var row = document.getElementById('ratingDisplay');
          if (row) row.innerHTML = renderRatingRow(avg, count);
          var card = document.getElementById('ratingCard');
          if (card) card.innerHTML = renderRatingCard(displayReviews);
        }).catch(function (err) {
          console.debug('Failed to fetch product ratings:', err && err.message);
        });
      }

      // Track product view (P0-B10). Mirrors React's useEffect at
      // ProductDetailPage.tsx:88-93: fire-and-forget call gated on
      // isAuthenticated so the server can record the interaction for
      // recommendation purposes.
      if (BH.Auth && BH.Auth.isAuthenticated() &&
        BH.api && BH.api.products && typeof BH.api.products.trackProductView === 'function') {
        BH.api.products.trackProductView(product.id).catch(function (err) {
          console.warn('Failed to track product view:', err && err.message);
        });
      }

      // Recently Viewed section (P0-B9). Mirrors React's
      // <RecentlyViewedProductsSection variant="inline"/> rendered
      // below Related Items in ProductDetailPage.tsx:837-838. Reads from
      // localStorage via BH.api.products.getRecentlyViewed() (bootstrap
      // uses a local rolling list rather than a server endpoint, so
      // works for guests too — the React version requires auth). The
      // current product is filtered out, then the list is sliced to 4.
      // Section stays hidden when there is nothing to show, matching
      // React's `if (products.length === 0) return null;`.
      if (BH.api && BH.api.products && typeof BH.api.products.getRecentlyViewed === 'function') {
        BH.api.products.getRecentlyViewed().then(function (res) {
          var items = ((res && res.data) || [])
            .filter(function (p) { return p && p.id !== product.id; })
            .slice(0, 4);
          if (!items.length) return;
          var grid = document.getElementById('recentlyViewedGrid');
          var section = document.getElementById('recentlyViewedSection');
          if (!grid || !section) return;
          grid.innerHTML = items.map(function (p) {
            return '<div class="col-6 col-sm-4 col-md-3">' + BH.renderProductCard(p) + '</div>';
          }).join('');
          section.hidden = false;
        }).catch(function (err) {
          console.debug('Failed to fetch recently viewed:', err && err.message);
        });
      }

      // Detail tab switcher (P0-B7). Mirrors React's setActiveDetailTab
      // handler in ProductDetailPage.tsx:543-555. Toggles the [hidden]
      // attribute on each pane and the .active class on each tab button,
      // and updates aria-selected for assistive tech.
      window.selectDetailTab = function (id) {
        var validIds = ['description', 'features', 'shipping'];
        if (validIds.indexOf(id) === -1) return;
        activeDetailTab = id;
        document.querySelectorAll('.bh-tab-button').forEach(function (btn) {
          var on = btn.getAttribute('data-tab-id') === id;
          btn.classList.toggle('active', on);
          btn.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        validIds.forEach(function (t) {
          var pane = document.getElementById('tabpane-' + t);
          if (pane) pane.hidden = (t !== id);
        });
      };

      window.updateQty = function (delta) {
        var input = document.getElementById('qty');
        var val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        input.value = val;
      };

      // Color variant selector (P0-B1). Updates the closure-scoped
      // selectedColor so future addToCart can attach it (P0-B3) and
      // toggles .active on the swatch buttons. Mirrors React's
      // setSelectedColor in ProductDetailPage.tsx.
      window.selectColor = function (id) {
        if (!colorVariant) return;
        var match = colorVariant.options.find(function (o) { return o.id === id; });
        if (!match || match.inStock === false) return;
        selectedColor = id;
        var btns = document.querySelectorAll('.bh-color-swatch');
        btns.forEach(function (btn) {
          var on = btn.getAttribute('data-color-id') === id;
          btn.classList.toggle('active', on);
          btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
      };

      // Size variant selector (P0-B2). Mirrors React's setSelectedSize in
      // ProductDetailPage.tsx:419-440.
      window.selectSize = function (id) {
        if (!sizeVariant) return;
        var match = sizeVariant.options.find(function (o) { return o.id === id; });
        if (!match || match.inStock === false) return;
        selectedSize = id;
        var btns = document.querySelectorAll('.bh-size-option');
        btns.forEach(function (btn) {
          var on = btn.getAttribute('data-size-id') === id;
          btn.classList.toggle('active', on);
          btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
      };

      window.addToCart = function () {
        var qty = parseInt(document.getElementById('qty').value) || 1;
        BH.Cart.addItem(product, qty);
      };

      // Buy Now (P0-B3). Mirrors React's handleCheckout in
      // ProductDetailPage.tsx:112-130: add to cart, show toast, navigate
      // to checkout. On any error show an error toast and stay on page.
      // BH.Cart.addItem itself shows a "Added to cart!" toast already, so
      // we don't double up; we just navigate on success.
      window.buyNow = function () {
        var qty = parseInt(document.getElementById('qty').value) || 1;
        try {
          BH.Cart.addItem(product, qty);
          window.location.href = 'checkout.html';
        } catch (err) {
          console.error(err);
          BH.showToast('Failed to add product to cart. Please try again.', 'error');
        }
      };
    });
  </script>
</body>

</html>
