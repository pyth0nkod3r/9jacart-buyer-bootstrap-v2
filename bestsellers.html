<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO meta (P0-A5) -->
  <meta name="description" content="Discover the top-selling products on BuyerHub. Shop the most popular items loved by thousands of buyers.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Best Sellers | BuyerHub">
  <meta property="og:description" content="Discover the top-selling products on BuyerHub. Shop the most popular items loved by thousands of buyers.">
  <meta property="og:url" content="https://www.buyerhub.com/bestsellers.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Best Sellers | BuyerHub">
  <meta name="twitter:description" content="Discover the top-selling products on BuyerHub. Shop the most popular items loved by thousands of buyers.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Best Sellers</li></ol></nav>
      <div class="bh-section-header mb-4"><h2>Best Sellers</h2><p>Our most popular products based on sales</p></div>
      <div class="row g-3 g-lg-4" id="grid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage({ page: 'bestsellers', activeBest: true });
      var items = BH.products.filter(function(p) { return p.flags && p.flags.bestseller; });
      if (items.length === 0) items = BH.products;
      document.getElementById('grid').innerHTML = items.map(function(p) {
        return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
      }).join('');
    });
  </script>
</body>
</html>
