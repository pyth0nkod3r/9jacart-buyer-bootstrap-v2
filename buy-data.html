<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Data | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4" style="max-width:600px">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item"><a href="services.html">Services</a></li><li class="breadcrumb-item active">Buy Data</li></ol></nav>
      <h1 class="bh-page-title mb-4"><i class="bi bi-wifi me-2"></i>Buy Data</h1>
      <div class="bh-card p-4">
        <form onsubmit="event.preventDefault();BH.showToast('Data plan purchased successfully!')">
          <div class="mb-3"><label class="form-label">Network</label>
            <select class="form-select bh-form-control" required>
              <option value="">Select Network</option>
              <option value="mtn">MTN</option>
              <option value="glo">Glo</option>
              <option value="airtel">Airtel</option>
              <option value="9mobile">9mobile</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" class="form-control bh-form-control" placeholder="Enter phone number" required></div>
          <div class="mb-3"><label class="form-label">Data Plan</label>
            <select class="form-select bh-form-control" required>
              <option value="">Select Plan</option>
              <option value="500mb">500MB - 1 Day - ₦200</option>
              <option value="1gb">1GB - 7 Days - ₦500</option>
              <option value="2gb">2GB - 30 Days - ₦1,000</option>
              <option value="3gb">3GB - 30 Days - ₦1,500</option>
              <option value="5gb">5GB - 30 Days - ₦2,500</option>
              <option value="10gb">10GB - 30 Days - ₦5,000</option>
            </select>
          </div>
          <button type="submit" class="btn btn-bh-primary w-100">Buy Data</button>
        </form>
      </div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() { BH.initPage(); });
  </script>
</body>
</html>
