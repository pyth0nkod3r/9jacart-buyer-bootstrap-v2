<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Order | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description" content="Rate your BuyerHub order and review the products you received. Help other buyers shop with confidence.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Rate Order | BuyerHub">
  <meta property="og:description" content="Rate your BuyerHub order and review the products you received. Help other buyers shop with confidence.">
  <meta property="og:url" content="https://www.buyerhub.com/rate-order.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rate Order | BuyerHub">
  <meta name="twitter:description" content="Rate your BuyerHub order and review the products you received. Help other buyers shop with confidence.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <!-- BH.Auth.requireAuth: zero-flash auth gate (P0-A2). Runs before <body> parses. -->
  <script>(function () { try { var d = JSON.parse(localStorage.getItem('BuyerHub-auth') || '{}'); if (!d || !d.user || !d.token) { var p = location.pathname.split('/').pop() || 'index.html'; location.replace('login.html?redirect=' + encodeURIComponent(p + location.search)); } } catch (e) { } })();</script>
</head>

<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3">
        <ol class="breadcrumb bh-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item"><a href="orders.html">Orders</a></li>
          <li class="breadcrumb-item active">Rate Order</li>
        </ol>
      </nav>
      <h1 class="bh-page-title mb-4">Rate Your Order</h1>
      <div id="rateContent"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage();
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id') || 'ORD-001';
      var order = (BH.orders || []).find(function (o) { return o.id === id }) || BH.orders[0];
      var content = document.getElementById('rateContent');
      content.innerHTML = '<div class="bh-card p-4 mb-4"><h5 class="fw-bold mb-1">Order #' + order.id + '</h5><p class="text-sm text-muted mb-0">Placed on ' + new Date(order.createdAt).toLocaleDateString() + '</p></div>' +
        order.items.map(function (item, idx) {
          var p = item.product;
          var img = Array.isArray(p.images) ? p.images[0] : (p.images && p.images.main) || '';
          return '<div class="bh-card p-4 mb-3"><div class="d-flex gap-3 mb-3"><div style="width:64px;height:64px" class="flex-shrink-0 rounded overflow-hidden"><img src="' + img + '" class="w-100 h-100" style="object-fit:contain"></div><div><p class="fw-medium mb-1">' + p.name + '</p><p class="text-sm text-muted mb-0">Qty: ' + item.quantity + '</p></div></div><div class="mb-3"><label class="form-label text-sm">Rating</label><div class="d-flex gap-1" id="stars-' + idx + '">' +
            [1, 2, 3, 4, 5].map(function (s) { return '<button class="btn p-0 border-0 fs-4 text-warning" data-star="' + s + '" onclick="setRating(' + idx + ',' + s + ')"><i class="bi bi-star"></i></button>'; }).join('') +
            '</div></div><div class="mb-3"><label class="form-label text-sm">Comment (optional)</label><textarea class="form-control bh-form-control" rows="2" placeholder="Share your experience..."></textarea></div></div>';
        }).join('') +
        '<button class="btn btn-bh-primary w-100" onclick="submitRating()">Submit Rating</button>';
      var ratings = {};
      window.setRating = function (idx, star) {
        ratings[idx] = star;
        var container = document.getElementById('stars-' + idx);
        container.querySelectorAll('button').forEach(function (btn) {
          var s = parseInt(btn.getAttribute('data-star'));
          btn.innerHTML = s <= star ? '<i class="bi bi-star-fill"></i>' : '<i class="bi bi-star"></i>';
        });
      };
      window.submitRating = function () { BH.showToast('Rating submitted!'); window.location.href = 'orders.html'; };
    });
  </script>
</body>

</html>
