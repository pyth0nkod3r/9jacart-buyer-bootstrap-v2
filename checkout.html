<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="Complete your BuyerHub purchase with secure checkout. Multiple payment options and fast delivery available.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Checkout | BuyerHub">
  <meta property="og:description"
    content="Complete your BuyerHub purchase with secure checkout. Multiple payment options and fast delivery available.">
  <meta property="og:url" content="https://www.buyerhub.com/checkout.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Checkout | BuyerHub">
  <meta name="twitter:description"
    content="Complete your BuyerHub purchase with secure checkout. Multiple payment options and fast delivery available.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>

<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3">
        <ol class="breadcrumb bh-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item"><a href="cart.html">Cart</a></li>
          <li class="breadcrumb-item active">Checkout</li>
        </ol>
      </nav>
      <h1 class="bh-page-title mb-4">Checkout</h1>
      <div id="checkoutContent"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage();
      var items = BH.Cart.getItems();
      var content = document.getElementById('checkoutContent');
      if (items.length === 0) {
        content.innerHTML = '<div class="text-center py-8"><h2 class="fw-bold mb-3">Your Cart is Empty</h2><p class="text-muted mb-4">Add some products to checkout</p><a href="products.html" class="btn btn-bh-primary">Browse Products</a></div>';
        return;
      }
      var user = BH.Auth.getUser() || {};
      var subtotal = BH.Cart.getSubtotal();
      var shipping = BH.Cart.getShipping();
      var flatRate = BH.Cart.getFlatRate();
      var total = subtotal + shipping + flatRate;
      content.innerHTML = '\
      <div class="row g-4">\
        <div class="col-lg-7">\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-semibold mb-3"><i class="bi bi-geo-alt me-2"></i>Billing Details</h5>\
            <div class="row g-3">\
              <div class="col-sm-6"><label class="form-label text-sm">First Name *</label><input name="firstName" id="firstName" value="'+ (user.firstName || '') + '" class="form-control bh-form-control" oninput="clearError(\'firstName\')"><p class="text-danger small mt-1" id="error-firstName" hidden></p></div>\
              <div class="col-sm-6"><label class="form-label text-sm">Last Name *</label><input name="lastName" id="lastName" value="'+ (user.lastName || '') + '" class="form-control bh-form-control" oninput="clearError(\'lastName\')"><p class="text-danger small mt-1" id="error-lastName" hidden></p></div>\
              <div class="col-12"><label class="form-label text-sm">Company Name (Optional)</label><input name="companyName" id="companyName" placeholder="Company name" class="form-control bh-form-control"></div>\
              <div class="col-12"><label class="form-label text-sm">Street Address *</label><input name="streetAddress" id="streetAddress" placeholder="House number and street name" class="form-control bh-form-control" oninput="clearError(\'streetAddress\')"><p class="text-danger small mt-1" id="error-streetAddress" hidden></p></div>\
              <div class="col-12"><label class="form-label text-sm">Apartment (Optional)</label><input name="apartment" id="apartment" placeholder="Apartment, suite, unit, etc." class="form-control bh-form-control"></div>\
              <div class="col-sm-6"><label class="form-label text-sm">Town/City *</label><input name="townCity" id="townCity" class="form-control bh-form-control" oninput="clearError(\'townCity\')"><p class="text-danger small mt-1" id="error-townCity" hidden></p></div>\
              <div class="col-sm-6"><label class="form-label text-sm">Phone *</label><input name="phoneNumber" id="phoneNumber" value="'+ (user.phone || '') + '" class="form-control bh-form-control" oninput="clearError(\'phoneNumber\')"><p class="text-danger small mt-1" id="error-phoneNumber" hidden></p></div>\
              <div class="col-12"><label class="form-label text-sm">Email Address *</label><input name="emailAddress" id="emailAddress" type="email" value="'+ (user.email || '') + '" class="form-control bh-form-control" oninput="clearError(\'emailAddress\')"><p class="text-danger small mt-1" id="error-emailAddress" hidden></p></div>\
            </div>\
          </div>\
          <div class="bh-card p-4">\
            <h5 class="fw-semibold mb-3"><i class="bi bi-credit-card me-2"></i>Payment Method</h5>\
            <div class="space-y-2">\
              <label class="d-flex align-items-center gap-3 p-3 border rounded" style="cursor:pointer">\
                <input type="radio" name="payment" value="bank-card" checked> <span>Bank Card (Paystack)</span>\
              </label>\
              <label class="d-flex align-items-center gap-3 p-3 border rounded opacity-50" style="cursor:pointer">\
                <input type="radio" name="payment" value="cod" disabled> <span>Cash on Delivery (Coming Soon)</span>\
              </label>\
            </div>\
          </div>\
        </div>\
        <div class="col-lg-5">\
          <div class="bh-card p-4 position-sticky" style="top:80px">\
            <h5 class="fw-semibold mb-3">Order Summary</h5>\
            <div class="space-y-2 mb-3">' +
        items.map(function (item) {
          var p = item.product;
          var price = typeof p.price === 'number' ? p.price : (p.price && p.price.current) || 0;
          return '<div class="d-flex justify-content-between text-sm"><span class="text-muted">' + p.name + ' x ' + item.quantity + '</span><span>' + BH.formatPrice(price * item.quantity) + '</span></div>';
        }).join('') + '\
            </div>\
            <hr>\
            <div class="d-flex justify-content-between mb-2"><span class="text-muted">Subtotal</span><span>'+ BH.formatPrice(subtotal) + '</span></div>\
            <div class="d-flex justify-content-between mb-2"><span class="text-muted"><i class="bi bi-truck me-1"></i>Shipping</span><span>'+ (shipping === 0 ? 'Free' : BH.formatPrice(shipping)) + '</span></div>' + (shipping > 0 ? '<p class="text-xs text-muted">Free shipping on orders over ₦50,000</p>' : '') + '\
            <div class="d-flex justify-content-between mb-2"><span class="text-muted">Handling</span><span>'+ BH.formatPrice(flatRate) + '</span></div>\
            <div class="d-flex justify-content-between fs-5 fw-bold pt-2 border-top"><span>Total</span><span>'+ BH.formatPrice(total) + '</span></div>\
            <p class="text-danger small mt-3" id="error-submit" hidden></p>\
            <button class="btn btn-bh-primary w-100 mt-3" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>\
          </div>\
        </div>\
      </div>';
      var isProcessing = false;
      window.clearError = function (fieldName) {
        var errorEl = document.getElementById('error-' + fieldName);
        var inputEl = document.getElementById(fieldName);
        if (errorEl) {
          errorEl.hidden = true;
          errorEl.textContent = '';
        }
        if (inputEl) {
          inputEl.classList.remove('is-invalid');
          inputEl.style.borderColor = '';
        }
      };
      window.showError = function (fieldName, message) {
        var errorEl = document.getElementById('error-' + fieldName);
        var inputEl = document.getElementById(fieldName);
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.hidden = false;
        }
        if (inputEl) {
          inputEl.classList.add('is-invalid');
          inputEl.style.borderColor = '#dc3545';
        }
      };
      window.setProcessing = function (processing) {
        isProcessing = processing;
        var btn = document.getElementById('placeOrderBtn');
        if (btn) {
          btn.disabled = processing;
          if (processing) {
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Processing...';
          } else {
            btn.innerHTML = 'Place Order';
          }
        }
      };
      window.validateForm = function () {
        var firstName = document.getElementById('firstName').value.trim();
        var lastName = document.getElementById('lastName').value.trim();
        var streetAddress = document.getElementById('streetAddress').value.trim();
        var townCity = document.getElementById('townCity').value.trim();
        var phoneNumber = document.getElementById('phoneNumber').value.trim();
        var emailAddress = document.getElementById('emailAddress').value.trim();
        var isValid = true;
        if (!firstName) {
          showError('firstName', 'First name is required');
          isValid = false;
        }
        if (!lastName) {
          showError('lastName', 'Last name is required');
          isValid = false;
        }
        if (!streetAddress) {
          showError('streetAddress', 'Address is required');
          isValid = false;
        }
        if (!townCity) {
          showError('townCity', 'City is required');
          isValid = false;
        }
        if (!phoneNumber) {
          showError('phoneNumber', 'Phone is required');
          isValid = false;
        }
        if (!emailAddress) {
          showError('emailAddress', 'Email is required');
          isValid = false;
        } else if (!/\S+@\S+\.\S+/.test(emailAddress)) {
          showError('emailAddress', 'Invalid email format');
          isValid = false;
        }
        return isValid;
      };
      window.placeOrder = function () {
        if (!validateForm()) return;
        setProcessing(true);
        var firstName = document.getElementById('firstName').value.trim();
        var lastName = document.getElementById('lastName').value.trim();
        var companyName = document.getElementById('companyName').value.trim();
        var streetAddress = document.getElementById('streetAddress').value.trim();
        var apartment = document.getElementById('apartment').value.trim();
        var townCity = document.getElementById('townCity').value.trim();
        var phoneNumber = document.getElementById('phoneNumber').value.trim();
        var emailAddress = document.getElementById('emailAddress').value.trim();
        var paymentMethod = document.querySelector('input[name="payment"]:checked').value;
        var orderData = {
          billing: {
            firstName: firstName + ' ' + lastName,
            companyName: companyName || '',
            streetAddress: streetAddress,
            apartment: apartment || '',
            city: townCity,
            phoneNumber: phoneNumber,
            emailAddress: emailAddress
          },
          items: items.map(function (item) {
            var p = item.product;
            var price = typeof p.price === 'number' ? p.price : (p.price && p.price.current) || 0;
            return {
              productId: p.id,
              vendor: p.vendorId || 'default',
              quantity: item.quantity,
              price: price,
              product: p
            };
          }),
          paymentMethod: paymentMethod
        };
        BH.api.orders.createOrder(orderData).then(function (res) {
          if (res.error) {
            setProcessing(false);
            var submitError = document.getElementById('error-submit');
            if (submitError) {
              submitError.textContent = res.message || 'Failed to place order. Please try again.';
              submitError.hidden = false;
            }
            return;
          }
          if (paymentMethod === 'bank-card' && res.paymentData && res.paymentData.authorizationUrl) {
            window.location.href = res.paymentData.authorizationUrl;
          } else {
            BH.Cart.clearCart();
            window.location.href = res.redirectUrl || 'orders.html?placed=' + res.orderNo;
          }
        }).catch(function (err) {
          setProcessing(false);
          var submitError = document.getElementById('error-submit');
          if (submitError) {
            submitError.textContent = 'Failed to place order. Please try again.';
            submitError.hidden = false;
          }
          console.error('Order failed:', err);
        });
      };
    });
  </script>
</body>

</html>
