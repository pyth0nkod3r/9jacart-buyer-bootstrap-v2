<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description" content="View and manage your BuyerHub wishlist. Save favorites and move them to cart anytime.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Wishlist | BuyerHub">
  <meta property="og:description" content="View and manage your BuyerHub wishlist. Save favorites and move them to cart anytime.">
  <meta property="og:url" content="https://www.buyerhub.com/wishlist.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Wishlist | BuyerHub">
  <meta name="twitter:description" content="View and manage your BuyerHub wishlist. Save favorites and move them to cart anytime.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <!-- BH.Auth.requireAuth: zero-flash auth gate (P0-A2). Runs before <body> parses. -->
  <script>(function () { try { var d = JSON.parse(localStorage.getItem('BuyerHub-auth') || '{}'); if (!d || !d.user || !d.token) { var p = location.pathname.split('/').pop() || 'index.html'; location.replace('login.html?redirect=' + encodeURIComponent(p + location.search)); } } catch (e) { } })();</script>
</head>

<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3">
        <ol class="breadcrumb bh-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active">Wishlist</li>
        </ol>
      </nav>
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h1 class="bh-page-title">My Wishlist</h1>
        <button class="btn btn-outline-danger btn-sm" onclick="BH.Wishlist.clearWishlist();renderWishlist()"><i
            class="bi bi-trash me-1"></i>Clear All</button>
      </div>
      <div class="row g-3 g-lg-4" id="wishlistGrid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    function renderWishlist() {
      var items = BH.Wishlist._items || [];
      var grid = document.getElementById('wishlistGrid');
      if (items.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-8"><i class="bi bi-heart fs-1 text-muted d-block mb-3"></i><h3 class="fw-medium mb-2">Your wishlist is empty</h3><p class="text-muted mb-4">Items you love will appear here.</p><a href="products.html" class="btn btn-bh-primary">Explore Products</a></div>';
        return;
      }
      grid.innerHTML = items.map(function (item) {
        return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(item.product) + '</div>';
      }).join('');
    }
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage({ page: 'wishlist' });
      renderWishlist();
      document.addEventListener('bh:wishlistupdate', renderWishlist);
    });
  </script>
</body>

</html>
