<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Airtime | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4" style="max-width:600px">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item"><a href="services.html">Services</a></li><li class="breadcrumb-item active">Buy Airtime</li></ol></nav>
      <h1 class="bh-page-title mb-4"><i class="bi bi-phone me-2"></i>Buy Airtime</h1>
      <div class="bh-card p-4">
        <form onsubmit="event.preventDefault();BH.showToast('Airtime purchased successfully!')">
          <div class="mb-3"><label class="form-label">Network</label>
            <select class="form-select bh-form-control" required>
              <option value="">Select Network</option>
              <option value="mtn">MTN</option>
              <option value="glo">Glo</option>
              <option value="airtel">Airtel</option>
              <option value="9mobile">9mobile</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" class="form-control bh-form-control" placeholder="Enter phone number" required></div>
          <div class="mb-3"><label class="form-label">Amount (₦)</label><input type="number" class="form-control bh-form-control" placeholder="e.g. 500, 1000, 2000" required></div>
          <div class="mb-4"><label class="form-label">Quick Amount</label>
            <div class="d-flex gap-2 flex-wrap">
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=100">₦100</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=200">₦200</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=500">₦500</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=1000">₦1,000</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=2000">₦2,000</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.querySelector('input[type=number]').value=5000">₦5,000</button>
            </div>
          </div>
          <button type="submit" class="btn btn-bh-primary w-100">Buy Airtime</button>
        </form>
      </div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() { BH.initPage(); });
  </script>
</body>
</html>
