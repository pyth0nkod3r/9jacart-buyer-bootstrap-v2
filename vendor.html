<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Storefront | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description" content="Browse this vendor storefront on BuyerHub. Discover their products, ratings, and best-sellers.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Vendor Storefront | BuyerHub">
  <meta property="og:description" content="Browse this vendor storefront on BuyerHub. Discover their products, ratings, and best-sellers.">
  <meta property="og:url" content="https://www.buyerhub.com/vendor.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vendor Storefront | BuyerHub">
  <meta name="twitter:description" content="Browse this vendor storefront on BuyerHub. Discover their products, ratings, and best-sellers.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Vendor Storefront</li></ol></nav>
      <div class="bh-card p-4 mb-4">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:64px;height:64px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));font-size:1.5rem;font-weight:700">TP</div>
          <div>
            <h1 class="fw-bold mb-1">TechStore Pro</h1>
            <div class="d-flex align-items-center gap-3 text-sm text-muted">
              <span><i class="bi bi-geo-alt me-1"></i>New York, USA</span>
              <span><i class="bi bi-patch-check-fill text-success me-1"></i>Verified</span>
              <span><i class="bi bi-star-fill text-warning me-1"></i>4.8 (15,420 sales)</span>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h3 class="fw-bold">Products</h3>
        <span class="text-sm text-muted">5 products</span>
      </div>
      <div class="row g-3 g-lg-4" id="grid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script">
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage();
      var sellerProducts = BH.products.filter(function(p){return p.sellerId==='seller-1';});
      document.getElementById('grid').innerHTML = sellerProducts.map(function(p) {
        return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
      }).join('');
    });
  </script>
</body>
</html>
