<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Contact Us</li></ol></nav>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="bh-card p-4 p-lg-5">
            <h1 class="bh-page-title mb-4">Get in Touch</h1>
            <p class="text-muted mb-4">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
            <form onsubmit="event.preventDefault();BH.showToast('Message sent successfully!')">
              <div class="row g-3">
                <div class="col-sm-6"><label class="form-label">First Name</label><input class="form-control bh-form-control" required></div>
                <div class="col-sm-6"><label class="form-label">Last Name</label><input class="form-control bh-form-control" required></div>
                <div class="col-12"><label class="form-label">Email</label><input type="email" class="form-control bh-form-control" required></div>
                <div class="col-12"><label class="form-label">Subject</label><input class="form-control bh-form-control" required></div>
                <div class="col-12"><label class="form-label">Message</label><textarea class="form-control bh-form-control" rows="5" required></textarea></div>
                <div class="col-12"><button type="submit" class="btn btn-bh-primary">Send Message</button></div>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="bh-card p-4 mb-4">
            <h5 class="fw-bold mb-3">Contact Information</h5>
            <div class="space-y-3">
              <div class="d-flex gap-3"><i class="bi bi-geo-alt fs-5"></i><div><p class="fw-medium mb-0">Address</p><p class="text-sm text-muted mb-0">123 Main Street, City, Country</p></div></div>
              <div class="d-flex gap-3"><i class="bi bi-telephone fs-5"></i><div><p class="fw-medium mb-0">Phone</p><p class="text-sm text-muted mb-0">+1 (234) 567-8900</p></div></div>
              <div class="d-flex gap-3"><i class="bi bi-envelope fs-5"></i><div><p class="fw-medium mb-0">Email</p><p class="text-sm text-muted mb-0">contact@example.com</p></div></div>
              <div class="d-flex gap-3"><i class="bi bi-clock fs-5"></i><div><p class="fw-medium mb-0">Business Hours</p><p class="text-sm text-muted mb-0">Mon - Fri: 9AM - 6PM</p></div></div>
            </div>
          </div>
          <div class="bh-card p-4">
            <h5 class="fw-bold mb-3">Follow Us</h5>
            <div class="d-flex gap-3">
              <a href="#" class="btn btn-outline-secondary btn-sm"><i class="bi bi-facebook"></i></a>
              <a href="#" class="btn btn-outline-secondary btn-sm"><i class="bi bi-twitter-x"></i></a>
              <a href="#" class="btn btn-outline-secondary btn-sm"><i class="bi bi-instagram"></i></a>
              <a href="#" class="btn btn-outline-secondary btn-sm"><i class="bi bi-linkedin"></i></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() { BH.initPage(); });
  </script>
</body>
</html>
