<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4">
      <nav class="mb-3" id="breadcrumb"></nav>
      <div class="mb-4">
        <h1 class="bh-page-title" id="catTitle">Category</h1>
        <p class="text-muted" id="catCount"></p>
      </div>
      <div class="row g-3 g-lg-4" id="grid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage();
      var params = new URLSearchParams(window.location.search);
      var catId = params.get('cat') || '';
      var catName = params.get('name') || 'Category';
      var cat = BH.mainCategories.find(function(c){return c.id===catId});
      if (cat) catName = cat.name;
      document.getElementById('catTitle').textContent = catName;
      document.getElementById('breadcrumb').innerHTML = BH.renderBreadcrumb([
        { label: 'Products', href: 'products.html' },
        { label: catName }
      ]);
      // Filter products by category
      var products = BH.products.filter(function(p){ return p.categoryId === catId; });
      if (products.length === 0) products = BH.products;
      document.getElementById('catCount').textContent = 'Showing ' + products.length + ' products';
      document.getElementById('grid').innerHTML = products.map(function(p) {
        return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
      }).join('');
    });
  </script>
</body>
</html>
