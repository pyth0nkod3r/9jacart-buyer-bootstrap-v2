<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description" content="Reset your BuyerHub password. Enter your email address to receive a verification code.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Forgot Password | BuyerHub">
  <meta property="og:description" content="Reset your BuyerHub password. Enter your email address to receive a verification code.">
  <meta property="og:url" content="https://www.buyerhub.com/forgot-password.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Forgot Password | BuyerHub">
  <meta name="twitter:description" content="Reset your BuyerHub password. Enter your email address to receive a verification code.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>

<body>
  <div class="bh-auth-layout">
    <div class="bh-auth-image-side"></div>
    <div class="bh-auth-form-side">
      <div class="bh-auth-form-inner">
        <div class="bh-auth-logo-wrap">
          <a href="index.html" class="bh-auth-logo-link" aria-label="BuyerHub home">
            <img src="img/logo.svg" alt="BuyerHub" class="bh-auth-logo">
          </a>
        </div>
        <div class="bh-auth-card">
          <div class="text-center mb-4">
            <h1 class="fs-4 fw-bold mb-1">Forgot your password?</h1>
            <p class="text-sm text-muted">Enter your email address and we'll send you a verification code to reset your password.</p>
          </div>

          <div id="errorAlert" class="alert alert-danger mb-4 d-none"></div>
          <div id="successAlert" class="alert mb-4 d-none bh-success-alert">
            Verification code sent! Redirecting to reset password…
          </div>

          <form id="forgotForm">
            <div class="mb-4">
              <label class="form-label text-sm fw-medium">Email address</label>
              <input type="email" id="email" class="form-control bh-form-control" placeholder="Enter your email"
                required>
            </div>
            <button type="submit" class="btn btn-bh-primary w-100 fw-semibold mb-3" id="sendBtn">Send Verification Code</button>
            <a href="login.html" class="btn btn-bh-outline w-100">Back to sign in</a>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.init();
      
      document.getElementById('forgotForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var email = document.getElementById('email').value.trim();
        if (!email) {
          document.getElementById('errorAlert').textContent = 'Please enter your email address.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          return;
        }
        
        var btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
        
        BH.api.auth.forgotPassword(email).then(function(res) {
          if (res.error) {
            document.getElementById('errorAlert').textContent = res.message || 'Failed to send verification code. Please try again.';
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('successAlert').classList.add('d-none');
            btn.disabled = false;
            btn.innerHTML = 'Send Verification Code';
            return;
          }
          
          var identifier = res.data.identifier;
          var verificationId = res.data.verificationId;
          
          document.getElementById('successAlert').classList.remove('d-none');
          document.getElementById('errorAlert').classList.add('d-none');
          
          setTimeout(function() {
            window.location.href = 'reset-password.html?identifier=' + encodeURIComponent(identifier) + '&verificationId=' + encodeURIComponent(verificationId);
          }, 1500);
        }).catch(function(err) {
          console.error('Forgot password failed:', err);
          document.getElementById('errorAlert').textContent = 'Failed to send verification code. Please try again.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          btn.disabled = false;
          btn.innerHTML = 'Send Verification Code';
        });
      });
    });
  </script>
</body>

</html>
