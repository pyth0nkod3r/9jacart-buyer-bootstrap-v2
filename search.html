<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Search Results</li></ol></nav>
      <h1 class="bh-page-title mb-2">Search Results</h1>
      <p class="text-muted mb-4" id="searchInfo"></p>
      <div class="row g-3 g-lg-4" id="resultsGrid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage();
      var params = new URLSearchParams(window.location.search);
      var q = (params.get('q') || '').toLowerCase();
      var cat = (params.get('category') || '').toLowerCase();
      var info = document.getElementById('searchInfo');
      var grid = document.getElementById('resultsGrid');
      info.textContent = 'Showing results for "' + q + '"' + (cat ? ' in ' + cat : '');
      var filtered = BH.products.filter(function(p) {
        if (!q) return false;
        var match = p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
        if (cat && p.categoryId !== cat) return false;
        return match;
      });
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-8"><i class="bi bi-search fs-1 text-muted d-block mb-3"></i><h3 class="fw-medium mb-2">No results found</h3><p class="text-muted">Try adjusting your search terms</p></div>';
        return;
      }
      grid.innerHTML = filtered.map(function(p) {
        return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
      }).join('');
    });
  </script>
</body>
</html>
