<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | BuyerHub</title>
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <style>
    .bh-otp-input {
      width: 3rem;
      height: 3rem;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      border: 1px solid hsl(var(--border));
      border-radius: 0.5rem;
      background: hsl(var(--card));
      color: hsl(var(--foreground));
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .bh-otp-input:focus {
      outline: none;
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 2px hsla(var(--primary), 0.2);
    }
  </style>
</head>
<body>
  <div class="min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5">
          <div class="text-center mb-3">
            <a href="index.html" class="text-decoration-none">
              <img src="img/logo.svg" alt="BuyerHub" style="height:36px;width:auto">
            </a>
          </div>
          <div class="bh-auth-card">
            <!-- Header -->
            <div class="text-center mb-5">
              <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-4" style="width:4rem;height:4rem;background:#dcfce7">
                <i class="bi bi-envelope" style="font-size:2rem;color:#16a34a"></i>
              </div>
              <h1 class="fs-4 fw-bold mb-2">Verify Your Email</h1>
              <p class="text-muted text-sm">
                Enter the 5-digit code we sent to your email address.
              </p>
            </div>

            <!-- Success alert (hidden by default) -->
            <div id="successAlert" class="alert mb-4 d-none" style="border:1px solid #bbf7d0;background:#f0fdf4;color:#166534">
              Email verified successfully! You can now sign in to your account.
            </div>
            <!-- Error alert (hidden by default) -->
            <div id="errorAlert" class="alert alert-danger mb-4 d-none"></div>

            <!-- OTP Form -->
            <form id="otpForm" onsubmit="handleVerify(event)">
              <div class="mb-4">
                <label class="form-label text-sm fw-medium text-center d-block mb-3">Verification Code</label>
                <div class="d-flex justify-content-center gap-2">
                  <input class="bh-otp-input" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" oninput="otpInput(this,0)" onkeydown="otpKeydown(event,0)">
                  <input class="bh-otp-input" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" oninput="otpInput(this,1)" onkeydown="otpKeydown(event,1)">
                  <input class="bh-otp-input" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" oninput="otpInput(this,2)" onkeydown="otpKeydown(event,2)">
                  <input class="bh-otp-input" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" oninput="otpInput(this,3)" onkeydown="otpKeydown(event,3)">
                  <input class="bh-otp-input" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" oninput="otpInput(this,4)" onkeydown="otpKeydown(event,4)">
                </div>
              </div>
              <button type="submit" class="btn btn-bh-primary w-100 mb-4" id="verifyBtn">Verify Email</button>
            </form>

            <!-- Footer links -->
            <div class="text-center">
              <p class="text-sm text-muted mb-3">
                Didn't receive the code?
                <button type="button" class="btn btn-link btn-sm p-0 fw-medium text-decoration-none" id="resendBtn" onclick="handleResend()" style="color:#166534">Resend code</button>
              </p>
              <div class="pt-3 border-top">
                <a href="register.html" class="text-sm text-muted text-decoration-none">
                  <i class="bi bi-arrow-left me-1"></i> Back to registration
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    var otpInputs = document.querySelectorAll('.bh-otp-input');

    function otpInput(el, index) {
      el.value = el.value.replace(/\D/g, '').slice(-1);
      if (el.value && index < 4) otpInputs[index + 1].focus();
    }
    function otpKeydown(e, index) {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        otpInputs[index - 1].focus();
      }
    }
    // Paste support
    document.querySelectorAll('.bh-otp-input').forEach(function(input, idx) {
      input.addEventListener('paste', function(e) {
        e.preventDefault();
        var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0, 5);
        otpInputs.forEach(function(inp, i) { inp.value = pasted[i] || ''; });
        var nextEmpty = Array.from(otpInputs).findIndex(function(inp) { return !inp.value; });
        var focusIdx = nextEmpty === -1 ? 4 : nextEmpty;
        otpInputs[focusIdx].focus();
      });
    });

    function handleVerify(e) {
      e.preventDefault();
      var code = Array.from(otpInputs).map(function(i) { return i.value; }).join('');
      var errEl = document.getElementById('errorAlert');
      var successEl = document.getElementById('successAlert');
      errEl.classList.add('d-none');
      if (code.length !== 5) {
        errEl.textContent = 'Please enter the complete 5-digit code';
        errEl.classList.remove('d-none');
        return;
      }
      var btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      setTimeout(function() {
        document.getElementById('otpForm').style.display = 'none';
        successEl.textContent = 'Email verified successfully! You can now sign in to your account.';
        successEl.classList.remove('d-none');
        BH.showToast('Email verified!');
        setTimeout(function() { window.location.href = 'login.html'; }, 2000);
      }, 1000);
    }

    var resendCooldown = 0;
    function handleResend() {
      if (resendCooldown > 0) return;
      BH.showToast('Verification code sent successfully!');
      resendCooldown = 60;
      var btn = document.getElementById('resendBtn');
      var interval = setInterval(function() {
        resendCooldown--;
        btn.textContent = resendCooldown > 0 ? 'Resend in ' + resendCooldown + 's' : 'Resend code';
        btn.disabled = resendCooldown > 0;
        if (resendCooldown <= 0) { clearInterval(interval); btn.style.color = '#166534'; }
      }, 1000);
      btn.style.color = 'hsl(var(--muted-foreground))';
    }

    document.addEventListener('DOMContentLoaded', function() { BH.init(); });
  </script>
</body>
</html>
