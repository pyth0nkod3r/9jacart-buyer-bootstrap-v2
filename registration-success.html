<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Successful | BuyerHub</title>
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div class="min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5">
          <div class="text-center mb-3">
            <a href="index.html" class="text-decoration-none">
              <img src="img/logo.svg" alt="BuyerHub" style="height:36px;width:auto">
            </a>
          </div>
          <div class="bh-auth-card text-center">
            <!-- CheckCircle icon in green circle -->
            <div class="mb-5">
              <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-4" style="width:4rem;height:4rem;background:#dcfce7">
                <i class="bi bi-check-circle-fill" style="font-size:2rem;color:#16a34a"></i>
              </div>
              <h1 class="fs-4 fw-bold mb-2">Registration Successful!</h1>
              <p class="text-muted">
                We've sent a verification code to your email address.
              </p>
            </div>
            <!-- Email alert -->
            <div class="alert mb-4 text-center p-3" style="border:1px solid #bbf7d0;background:#f0fdf4;color:#166534">
              <p class="fw-medium d-flex align-items-center justify-content-center gap-2 mb-1">
                <i class="bi bi-envelope"></i> Check your email
              </p>
              <p class="text-sm mb-0">
                We sent a 5-digit verification code to your registered email.
              </p>
            </div>
            <!-- Actions -->
            <div class="d-grid gap-3">
              <a href="verify-email.html" class="btn btn-bh-primary">
                Verify Email Address
              </a>
              <p class="text-sm text-muted mb-0">
                Didn't receive the email?
                <a href="verify-email.html" class="fw-medium" style="color:#166534">Resend verification code</a>
              </p>
              <div class="pt-3 border-top">
                <a href="register.html" class="text-sm text-muted text-decoration-none">
                  <i class="bi bi-arrow-left me-1"></i> Back to registration
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() { BH.init(); });
  </script>
</body>
</html>
