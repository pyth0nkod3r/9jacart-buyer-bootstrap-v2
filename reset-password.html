<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BuyerHub</title>
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <!-- inline styles moved to css/custom.css -->
</head>
<body>
  <div class="min-vh-100 d-flex align-items-center py-4 bh-page-bg">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5">
          <div class="text-center mb-3">
            <a href="index.html" class="text-decoration-none">
              <img src="img/logo.svg" alt="BuyerHub" class="bh-logo-img">
            </a>
          </div>
          <div class="bh-auth-card">
            <div class="text-center mb-4">
              <h1 class="fs-4 fw-bold mb-1">Reset your password</h1>
              <p class="text-sm text-muted">Enter the 5-digit code from your email and choose a new password.</p>
            </div>

            <div id="errorAlert" class="alert alert-danger mb-4 d-none"></div>
            <div id="successAlert" class="alert mb-4 d-none bh-success-alert">
              Password reset successfully! Redirecting to sign in…
            </div>

            <form id="resetForm">
              <!-- OTP boxes -->
              <div class="mb-4">
                <label class="form-label text-sm fw-medium text-center d-block mb-3">Verification Code</label>
                <div class="d-flex justify-content-center gap-2">
                  <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                  <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                  <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                  <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                  <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                </div>
              </div>
              <!-- New password -->
              <div class="mb-3">
                <label class="form-label text-sm fw-medium">New password</label>
                <div class="position-relative">
                  <input type="password" id="newPwd" class="form-control bh-form-control pe-5" placeholder="Enter new password" required minlength="8">
                  <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent bh-toggle-pwd">
                    <i class="bi bi-eye text-muted"></i>
                  </button>
                </div>
              </div>
              <!-- Confirm password -->
              <div class="mb-4">
                <label class="form-label text-sm fw-medium">Confirm new password</label>
                <div class="position-relative">
                  <input type="password" id="confirmPwd" class="form-control bh-form-control pe-5" placeholder="Confirm new password" required>
                  <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent bh-toggle-pwd">
                    <i class="bi bi-eye text-muted"></i>
                  </button>
                </div>
              </div>
              <div class="d-flex gap-2">
                <a href="login.html" class="btn btn-bh-outline flex-fill">Back to sign in</a>
                <button type="submit" class="btn btn-bh-primary flex-fill" id="resetBtn">Reset Password</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
