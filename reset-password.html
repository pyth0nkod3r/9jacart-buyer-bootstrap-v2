<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="Reset your BuyerHub account password. Enter the verification code from your email and choose a new password.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Reset Password | BuyerHub">
  <meta property="og:description"
    content="Reset your BuyerHub account password. Enter the verification code from your email and choose a new password.">
  <meta property="og:url" content="https://www.buyerhub.com/reset-password.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Reset Password | BuyerHub">
  <meta name="twitter:description"
    content="Reset your BuyerHub account password. Enter the verification code from your email and choose a new password.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <!-- inline styles moved to css/custom.css -->
</head>

<body>
  <div class="bh-auth-layout">
    <div class="bh-auth-image-side"></div>
    <div class="bh-auth-form-side">
      <div class="bh-auth-form-inner">
        <div class="bh-auth-logo-wrap">
          <a href="index.html" class="bh-auth-logo-link" aria-label="BuyerHub home">
            <img src="img/logo.svg" alt="BuyerHub" class="bh-auth-logo">
          </a>
        </div>
        <div class="bh-auth-card">
          <div class="text-center mb-4">
            <h1 class="fs-4 fw-bold mb-1">Reset your password</h1>
            <p class="text-sm text-muted">Enter the 5-digit code from your email and choose a new password.</p>
          </div>

          <div id="errorAlert" class="alert alert-danger mb-4 d-none"></div>
          <div id="successAlert" class="alert mb-4 d-none bh-success-alert">
            Password reset successfully! Redirecting to sign in…
          </div>

          <form id="resetForm">
            <!-- OTP boxes -->
            <div class="mb-4">
              <label class="form-label text-sm fw-medium text-center d-block mb-3">Verification Code</label>
              <div class="d-flex justify-content-center gap-2">
                <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
                <input class="bh-otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              </div>
            </div>
            <!-- New password -->
            <div class="mb-3">
              <label class="form-label text-sm fw-medium">New password</label>
              <div class="position-relative">
                <input type="password" id="newPwd" class="form-control bh-form-control pe-5"
                  placeholder="Enter new password" required minlength="8">
                <button type="button"
                  class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent bh-toggle-pwd">
                  <i class="bi bi-eye text-muted"></i>
                </button>
              </div>
            </div>
            <!-- Confirm password -->
            <div class="mb-4">
              <label class="form-label text-sm fw-medium">Confirm new password</label>
              <div class="position-relative">
                <input type="password" id="confirmPwd" class="form-control bh-form-control pe-5"
                  placeholder="Confirm new password" required>
                <button type="button"
                  class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent bh-toggle-pwd">
                  <i class="bi bi-eye text-muted"></i>
                </button>
              </div>
            </div>
            <div class="d-flex gap-2">
              <a href="login.html" class="btn btn-bh-outline flex-fill">Back to sign in</a>
              <button type="submit" class="btn btn-bh-primary flex-fill" id="resetBtn">Reset Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.init();

      var params = new URLSearchParams(window.location.search);
      var identifier = params.get('identifier');
      var verificationId = params.get('verificationId');

      if (!identifier || !verificationId) {
        document.getElementById('errorAlert').textContent = 'Missing verification parameters. Please request a new password reset link.';
        document.getElementById('errorAlert').classList.remove('d-none');
      }

      var otpInputs = document.querySelectorAll('.bh-otp-input');
      otpInputs.forEach(function (input, index) {
        input.addEventListener('input', function (e) {
          if (e.target.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
            otpInputs[index - 1].focus();
          }
        });
      });

      document.querySelectorAll('.bh-toggle-pwd').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var input = btn.parentElement.querySelector('input');
          input.type = input.type === 'password' ? 'text' : 'password';
          btn.innerHTML = input.type === 'password' ? '<i class="bi bi-eye text-muted"></i>' : '<i class="bi bi-eye-slash text-muted"></i>';
        });
      });

      document.getElementById('resetForm').addEventListener('submit', function (e) {
        e.preventDefault();

        var code = Array.from(otpInputs).map(function (input) { return input.value; }).join('');
        if (code.length !== 5) {
          document.getElementById('errorAlert').textContent = 'Please enter the complete 5-digit verification code.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          return;
        }

        var newPwd = document.getElementById('newPwd').value;
        var confirmPwd = document.getElementById('confirmPwd').value;

        if (newPwd !== confirmPwd) {
          document.getElementById('errorAlert').textContent = 'Passwords do not match.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          return;
        }

        if (newPwd.length < 8) {
          document.getElementById('errorAlert').textContent = 'Password must be at least 8 characters.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          return;
        }

        var btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';

        BH.api.auth.resetPassword(verificationId || code, newPwd, confirmPwd).then(function (res) {
          if (res.error) {
            document.getElementById('errorAlert').textContent = res.message || 'Failed to reset password. Please try again.';
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('successAlert').classList.add('d-none');
            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
            return;
          }
          document.getElementById('successAlert').classList.remove('d-none');
          document.getElementById('errorAlert').classList.add('d-none');
          setTimeout(function () {
            window.location.href = 'login.html';
          }, 2000);
        }).catch(function (err) {
          console.error('Reset password failed:', err);
          document.getElementById('errorAlert').textContent = 'Failed to reset password. Please try again.';
          document.getElementById('errorAlert').classList.remove('d-none');
          document.getElementById('successAlert').classList.add('d-none');
          btn.disabled = false;
          btn.innerHTML = 'Reset Password';
        });
      });
    });
  </script>
</body>

</html>
