<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="View full details for your BuyerHub order: items, payment, delivery address, and tracking information.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Order Detail | BuyerHub">
  <meta property="og:description"
    content="View full details for your BuyerHub order: items, payment, delivery address, and tracking information.">
  <meta property="og:url" content="https://www.buyerhub.com/order-detail.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Order Detail | BuyerHub">
  <meta name="twitter:description"
    content="View full details for your BuyerHub order: items, payment, delivery address, and tracking information.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <!-- BH.Auth.requireAuth: zero-flash auth gate (P0-A2). Runs before <body> parses. -->
  <script>(function () { try { var d = JSON.parse(localStorage.getItem('BuyerHub-auth') || '{}'); if (!d || !d.user || !d.token) { var p = location.pathname.split('/').pop() || 'index.html'; location.replace('login.html?redirect=' + encodeURIComponent(p + location.search)); } } catch (e) { } })();</script>
</head>

<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3">
        <ol class="breadcrumb bh-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item"><a href="orders.html">Orders</a></li>
          <li class="breadcrumb-item active">Order Detail</li>
        </ol>
      </nav>
      <div id="detail"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage();
      var detail = document.getElementById('detail');
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      if (!id) {
        detail.innerHTML = '<div class="bh-card text-center p-8"><p class="text-danger">Order ID is required</p></div>';
        return;
      }
      detail.innerHTML = '<div class="text-center py-12"><div class="spinner-border text-primary" role="status"></div></div>';

      BH.api.orders.getOrder(id).then(function (res) {
        if (res.error) {
          detail.innerHTML = '<div class="bh-card text-center p-8"><p class="text-danger">Error loading order: ' + (res.message || 'Unknown error') + '</p></div>';
          return;
        }
        var order = res.data;
        if (!order) {
          detail.innerHTML = '<div class="bh-card text-center p-8"><p class="text-danger">Order not found</p></div>';
          return;
        }
        var addr = order.shippingAddress || {};
        var billAddr = order.billingAddress || {};
        var subtotal = order.subtotal || order.total || 0;
        var tax = order.tax || 0;
        var shipping = order.shipping || 0;
        var discount = order.discount || 0;
        var total = order.total || 0;
        document.getElementById('detail').innerHTML = '\
      <div class="d-flex align-items-center gap-3 mb-4">\
        <h1 class="bh-page-title mb-0">Order #'+ (order.orderId || order.orderNumber || order.orderNo || order.id) + '</h1>\
        <span class="badge '+ (order.status === 'delivered' ? 'bg-success' : order.status === 'shipped' ? 'bg-primary' : order.status === 'processing' ? 'bg-warning' : 'bg-secondary') + '">' + (order.status || '').charAt(0).toUpperCase() + (order.status || '').slice(1) + '</span>\
      </div>\
      <div class="row g-4">\
        <div class="col-lg-8">\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-bold mb-3">Order Items</h5>' +
          (order.items || []).map(function (item) {
            var p = item.product || {};
            var price = typeof p.price === 'number' ? p.price : (p.price && p.price.current) || (item.price || 0);
            var img = Array.isArray(p.images) ? p.images[0] : (p.images && p.images.main) || item.productImage || '';
            var name = p.name || item.productName || 'Product';
            return '<div class="d-flex align-items-center gap-3 p-3 mb-2 border-bottom"><div style="width:64px;height:64px" class="flex-shrink-0 rounded overflow-hidden"><img src="' + img + '" class="w-100 h-100" style="object-fit:contain"></div><div class="flex-grow-1"><p class="fw-medium mb-1">' + name + '</p><p class="text-sm text-muted mb-0">Qty: ' + (item.quantity || 1) + '</p></div><div class="fw-bold">' + BH.formatPrice(price * (item.quantity || 1)) + '</div></div>';
          }).join('') + '\
          </div>\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-bold mb-3"><i class="bi bi-geo-alt me-2"></i>Shipping Address</h5>\
            <p class="text-sm mb-0">'+ (addr.firstName || '') + ' ' + (addr.lastName || '') + '<br>' + (addr.streetAddress || addr.street || '') + '<br>' + (addr.city || '') + (addr.state ? ', ' + addr.state : '') + (addr.zipCode ? ' ' + addr.zipCode : '') + (addr.country ? '<br>' + addr.country : '') + (addr.phoneNumber ? '<br>Phone: ' + addr.phoneNumber : '') + (addr.emailAddress ? '<br>Email: ' + addr.emailAddress : '') + '</p>\
          </div>' +
          (billAddr.firstName ? '\
          <div class="bh-card p-4">\
            <h5 class="fw-bold mb-3"><i class="bi bi-file-text me-2"></i>Billing Address</h5>\
            <p class="text-sm mb-0">'+ (billAddr.firstName || '') + ' ' + (billAddr.lastName || '') + '<br>' + (billAddr.streetAddress || billAddr.street || '') + '<br>' + (billAddr.city || '') + (billAddr.state ? ', ' + billAddr.state : '') + (billAddr.zipCode ? ' ' + billAddr.zipCode : '') + (billAddr.country ? '<br>' + billAddr.country : '') + '</p>\
          </div>' : '') + '\
        </div>\
        <div class="col-lg-4">\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-bold mb-3">Payment Summary</h5>\
            <div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Subtotal</span><span>'+ BH.formatPrice(subtotal) + '</span></div>' +
          (discount > 0 ? '<div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Discount</span><span class="text-success">-' + BH.formatPrice(discount) + '</span></div>' : '') + '\
            ' + (shipping > 0 ? '<div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Shipping</span><span>' + BH.formatPrice(shipping) + '</span></div>' : '<div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Shipping</span><span>Free</span></div>') + '\
            ' + (tax > 0 ? '<div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Tax</span><span>' + BH.formatPrice(tax) + '</span></div>' : '') + '\
            <hr><div class="d-flex justify-content-between fw-bold"><span>Total</span><span>'+ BH.formatPrice(total) + '</span></div>\
          </div>' +
          (order.paymentMethod ? '\
          <div class="bh-card p-4">\
            <h5 class="fw-bold mb-3"><i class="bi bi-credit-card me-2"></i>Payment Information</h5>\
            <div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Method</span><span class="text-capitalize">'+ order.paymentMethod + '</span></div>' +
            (order.paymentStatus ? '<div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Status</span><span class="badge ' + (order.paymentStatus.toLowerCase() === 'paid' ? 'bg-success' : 'bg-warning') + '">' + order.paymentStatus + '</span></div>' : '') + '\
          </div>' : '') + '\
        </div>\
      </div>';
      }).catch(function (err) {
        console.error('Failed to load order:', err);
        detail.innerHTML = '<div class="bh-card text-center p-8"><p class="text-danger">Error loading order. Please try again later.</p></div>';
      });
    });
  </script>
</body>

</html>
