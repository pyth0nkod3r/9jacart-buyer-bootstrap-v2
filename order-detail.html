<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail | BuyerHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="container-xl px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item"><a href="orders.html">Orders</a></li><li class="breadcrumb-item active">Order Detail</li></ol></nav>
      <div id="detail"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage();
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id') || 'ORD-001';
      var order = (BH.orders||[]).find(function(o){return o.id===id}) || BH.orders[0];
      var addr = order.shippingAddress || {};
      document.getElementById('detail').innerHTML = '\
      <div class="d-flex align-items-center gap-3 mb-4">\
        <h1 class="bh-page-title mb-0">Order #'+order.id+'</h1>\
        <span class="badge '+(order.status==='delivered'?'bg-success':order.status==='shipped'?'bg-primary':'bg-warning')+'">'+order.status.charAt(0).toUpperCase()+order.status.slice(1)+'</span>\
      </div>\
      <div class="row g-4">\
        <div class="col-lg-8">\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-bold mb-3">Tracking Timeline</h5>\
            <div class="d-flex gap-2 align-items-start">\
              <div class="text-center flex-shrink-0"><div class="rounded-circle d-flex align-items-center justify-content-center" style="width:32px;height:32px;background:hsl(var(--success));color:white"><i class="bi bi-check"></i></div><span class="d-block text-xs mt-1">Ordered</span></div>\
              <div class="flex-grow-1 pt-3 border-top"></div>\
              <div class="text-center flex-shrink-0"><div class="rounded-circle d-flex align-items-center justify-content-center" style="width:32px;height:32px;background:hsl(var(--success));color:white"><i class="bi bi-check"></i></div><span class="d-block text-xs mt-1">Processing</span></div>\
              <div class="flex-grow-1 pt-3 border-top"></div>\
              <div class="text-center flex-shrink-0"><div class="rounded-circle d-flex align-items-center justify-content-center '+(order.status!=='pending'?'':'opacity-50')+'" style="width:32px;height:32px;background:'+(order.status!=='pending'?'hsl(var(--success))':'hsl(var(--muted))')+';color:white"><i class="bi bi-truck"></i></div><span class="d-block text-xs mt-1">Shipped</span></div>\
              <div class="flex-grow-1 pt-3 border-top"></div>\
              <div class="text-center flex-shrink-0"><div class="rounded-circle d-flex align-items-center justify-content-center '+(order.status==='delivered'?'':'opacity-50')+'" style="width:32px;height:32px;background:'+(order.status==='delivered'?'hsl(var(--success))':'hsl(var(--muted))')+';color:white"><i class="bi bi-check-circle"></i></div><span class="d-block text-xs mt-1">Delivered</span></div>\
            </div>\
          </div>\
          <div class="bh-card p-4">\
            <h5 class="fw-bold mb-3">Order Items</h5>' +
            order.items.map(function(item) {
              var p = item.product;
              var price = typeof p.price==='number'?p.price:(p.price&&p.price.current)||0;
              var img = Array.isArray(p.images)?p.images[0]:(p.images&&p.images.main)||'';
              return '<div class="d-flex align-items-center gap-3 p-3 mb-2 border-bottom"><div style="width:64px;height:64px" class="flex-shrink-0 rounded overflow-hidden"><img src="'+img+'" class="w-100 h-100" style="object-fit:contain"></div><div class="flex-grow-1"><p class="fw-medium mb-1">'+p.name+'</p><p class="text-sm text-muted mb-0">Qty: '+item.quantity+'</p></div><div class="fw-bold">'+BH.formatPrice(price*item.quantity)+'</div></div>';
            }).join('') + '\
          </div>\
        </div>\
        <div class="col-lg-4">\
          <div class="bh-card p-4 mb-4">\
            <h5 class="fw-bold mb-3">Shipping Address</h5>\
            <p class="text-sm mb-0">'+addr.firstName+' '+addr.lastName+'<br>'+addr.street+'<br>'+addr.city+', '+addr.state+' '+addr.zipCode+'<br>'+addr.country+'</p>\
          </div>\
          <div class="bh-card p-4">\
            <h5 class="fw-bold mb-3">Payment Summary</h5>\
            <div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Subtotal</span><span>'+BH.formatPrice(order.total)+'</span></div>\
            <div class="d-flex justify-content-between mb-2 text-sm"><span class="text-muted">Shipping</span><span>Free</span></div>\
            <hr><div class="d-flex justify-content-between fw-bold"><span>Total</span><span>'+BH.formatPrice(order.total)+'</span></div>\
          </div>\
        </div>\
      </div>';
    });
  </script>
</body>
</html>
