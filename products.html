<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="Browse all products on BuyerHub. Search, filter by category, and discover great deals across every department.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="All Products | BuyerHub">
  <meta property="og:description"
    content="Browse all products on BuyerHub. Search, filter by category, and discover great deals across every department.">
  <meta property="og:url" content="https://www.buyerhub.com/products.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="All Products | BuyerHub">
  <meta name="twitter:description"
    content="Browse all products on BuyerHub. Search, filter by category, and discover great deals across every department.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>

<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3">
        <ol class="breadcrumb bh-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active">All Products</li>
        </ol>
      </nav>
      <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="bh-page-title">All Products</h1>
          <p class="text-sm text-muted mt-1" id="productCount"></p>
        </div>
        <div style="max-width:400px" class="w-100">
          <div class="d-flex gap-2">
            <input type="text" id="searchInput" placeholder="Search products..."
              class="form-control bh-form-control flex-grow-1">
            <button class="btn btn-bh-primary" onclick="filterProducts()"><i class="bi bi-search"></i></button>
          </div>
        </div>
      </div>
      <div class="row g-4">
        <div class="d-none d-lg-block col-lg-2">
          <div class="bh-card p-3 position-sticky" style="top:80px">
            <h6 class="fw-bold mb-3">Categories</h6>
            <div id="sidebarCats"></div>
          </div>
        </div>
        <div class="col-12 col-lg-10">
          <div class="row g-3 g-lg-4" id="productsGrid"></div>
          <div id="paginationContainer" class="d-flex justify-content-center align-items-center gap-2 mt-4" hidden>
          </div>
          <div id="recentlyViewedContainer" class="mt-8 pt-8 border-top" hidden></div>
        </div>
      </div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BH.initPage({ page: 'products', activeAll: true });
      var sidebar = document.getElementById('sidebarCats');
      if (sidebar) {
        sidebar.innerHTML = BH.mainCategories.map(function (cat) {
          return '<a href="category.html?cat=' + cat.id + '&name=' + encodeURIComponent(cat.name) + '" class="d-block py-1 text-sm text-decoration-none" style="color:hsl(var(--foreground))">' + cat.name + '</a>';
        }).join('');
      }

      var currentPage = 1;
      var perPage = 12;
      var searchQuery = '';
      var currentPagination = null;

      window.filterProducts = function () {
        searchQuery = (document.getElementById('searchInput').value || '').trim();
        currentPage = 1;
        loadProducts();
      };

      window.changePage = function (newPage) {
        currentPage = newPage;
        loadProducts();
      };

      function renderPagination(pagination) {
        currentPagination = pagination;
        var container = document.getElementById('paginationContainer');
        if (!container) return;
        if (pagination.totalPages <= 1) {
          container.hidden = true;
          return;
        }
        container.hidden = false;
        container.innerHTML = '<button class="btn btn-outline-secondary px-4 py-2" onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>Previous</button>' +
          '<span class="px-4 py-2 text-sm text-muted">Page ' + pagination.currentPage + ' of ' + pagination.totalPages + '</span>' +
          '<button class="btn btn-outline-secondary px-4 py-2" onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage >= pagination.totalPages ? 'disabled' : '') + '>Next</button>';
      }

      function renderGrid(products, pagination) {
        var grid = document.getElementById('productsGrid');
        var count = document.getElementById('productCount');
        if (count) count.textContent = 'Showing ' + products.length + ' of ' + (pagination ? pagination.totalItems : 0) + ' active product' + ((pagination ? pagination.totalItems : 0) !== 1 ? 's' : '');
        if (products.length === 0) {
          grid.innerHTML = '<div class="col-12 text-center py-8"><p class="text-muted">No products found</p></div>';
          return;
        }
        grid.innerHTML = products.map(function (p) {
          return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
        }).join('');
      }

      function loadProducts() {
        var grid = document.getElementById('productsGrid');
        var count = document.getElementById('productCount');
        var paginationContainer = document.getElementById('paginationContainer');
        if (grid) grid.innerHTML = '<div class="col-12 text-center py-8"><div class="spinner-border text-primary" role="status"></div></div>';
        if (count) count.textContent = 'Loading...';
        if (paginationContainer) paginationContainer.hidden = true;

        var params = { page: currentPage, perPage: perPage, isActive: '1' };
        if (searchQuery) params.search = searchQuery;

        BH.api.products.listProducts(params).then(function (res) {
          if (res.error) {
            if (grid) grid.innerHTML = '<div class="col-12 text-center py-8"><p class="text-danger">Error loading products: ' + (res.message || 'Unknown error') + '</p></div>';
            if (count) count.textContent = 'Error loading products';
            return;
          }
          renderGrid(res.data, res.pagination);
          renderPagination(res.pagination);
          loadRecentlyViewed();
        }).catch(function (err) {
          if (grid) grid.innerHTML = '<div class="col-12 text-center py-8"><p class="text-danger">Error loading products</p></div>';
          if (count) count.textContent = 'Error loading products';
          console.error('Failed to load products:', err);
        });
      }

      function loadRecentlyViewed() {
        var container = document.getElementById('recentlyViewedContainer');
        if (!container) return;

        if (!BH.Auth || !BH.Auth.isAuthenticated()) {
          container.hidden = true;
          return;
        }

        container.innerHTML = '<div class="text-center py-8"><div class="spinner-border text-primary" role="status"></div></div>';
        container.hidden = false;

        BH.api.products.getRecentlyViewed({ limit: 4 }).then(function (res) {
          if (res.error || !res.data || !res.data.length) {
            container.hidden = true;
            return;
          }
          var header = '<div class="d-flex align-items-center gap-3 mb-4">' +
            '<div class="rounded" style="width:0.5rem;height:1.75rem;background-color:hsl(var(--primary))" aria-hidden="true"></div>' +
            '<div>' +
            '<h2 class="fw-bold m-0">Recently Viewed</h2>' +
            '<p class="text-muted small mb-0">Your recently viewed items are waiting</p>' +
            '</div>' +
            '</div>';
          var cards = res.data.map(function (p) {
            return '<div class="col-6 col-sm-4 col-lg-4 col-xl-3">' + BH.renderProductCard(p) + '</div>';
          }).join('');
          container.innerHTML = header + '<div class="row g-3 g-lg-4">' + cards + '</div>';
        }).catch(function (err) {
          console.error('Failed to load recently viewed:', err);
          container.hidden = true;
        });
      }

      loadProducts();
      var searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.addEventListener('input', BH.debounce(filterProducts, 300));
    });
  </script>
</body>

</html>
