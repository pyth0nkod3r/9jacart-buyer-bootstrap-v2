<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | BuyerHub</title>
  <!-- SEO meta (P0-A5) -->
  <meta name="description"
    content="Create your free BuyerHub account in seconds. Start shopping, save favorites, and track your orders.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Create Account | BuyerHub">
  <meta property="og:description"
    content="Create your free BuyerHub account in seconds. Start shopping, save favorites, and track your orders.">
  <meta property="og:url" content="https://www.buyerhub.com/register.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Create Account | BuyerHub">
  <meta name="twitter:description"
    content="Create your free BuyerHub account in seconds. Start shopping, save favorites, and track your orders.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link rel="icon" type="image/svg+xml" href="img/buyerhub-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>

<body>
  <div class="bh-auth-layout">
    <div class="bh-auth-image-side"></div>
    <div class="bh-auth-form-side">
      <div class="bh-auth-form-inner">
        <div class="bh-auth-logo-wrap">
          <a href="index.html" class="bh-auth-logo-link" aria-label="BuyerHub home">
            <img src="img/logo.svg" alt="BuyerHub" class="bh-auth-logo">
          </a>
        </div>
        <div class="bh-auth-card">
          <div class="text-center mb-4">
            <h1 class="fs-4 fw-bold">Create your account</h1>
            <p class="text-sm text-muted mt-1">
              Already have an account?
              <a href="login.html" class="fw-medium" style="color:hsl(var(--primary))">Sign in</a>
            </p>
          </div>
          <form onsubmit="event.preventDefault();handleRegister()">
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label text-sm fw-medium">First name</label>
                <input id="fn" class="form-control bh-form-control" placeholder="First name" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label text-sm fw-medium">Last name</label>
                <input id="ln" class="form-control bh-form-control" placeholder="Last name" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label text-sm fw-medium">Email address</label>
              <input type="email" id="email" class="form-control bh-form-control" placeholder="Enter your email"
                required>
            </div>
            <div class="mb-3">
              <label class="form-label text-sm fw-medium">Password</label>
              <div class="position-relative">
                <input type="password" id="pwd" class="form-control bh-form-control pe-5"
                  placeholder="Create a password" required minlength="8">
                <button type="button"
                  class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent"
                  onclick="togglePwd(this)">
                  <i class="bi bi-eye text-muted"></i>
                </button>
              </div>
              <div class="mt-2">
                <div class="progress" style="height:4px">
                  <div id="strengthBar" class="progress-bar" role="progressbar" style="width:0%"></div>
                </div>
                <p id="strengthText" class="text-xs text-muted mt-1 mb-0">Password strength</p>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label text-sm fw-medium">Confirm password</label>
              <div class="position-relative">
                <input type="password" id="cpwd" class="form-control bh-form-control pe-5"
                  placeholder="Confirm your password" required>
                <button type="button"
                  class="btn btn-sm position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent"
                  onclick="togglePwd(this)">
                  <i class="bi bi-eye text-muted"></i>
                </button>
              </div>
              <p id="matchText" class="text-xs mt-1 mb-0"></p>
            </div>
            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label text-sm" for="terms">
                  I agree to the
                  <a href="terms-of-use.html" style="color:hsl(var(--primary))">Terms of Service</a>
                  and
                  <a href="privacy.html" style="color:hsl(var(--primary))">Privacy Policy</a>
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-bh-primary w-100 fw-semibold">Create account</button>
          </form>
          <div class="mt-4">
            <div class="position-relative my-3">
              <hr>
              <span class="position-absolute top-50 start-50 translate-middle px-2 text-sm text-muted"
                style="background:#F8FEF8">Or continue with</span>
            </div>
            <button class="btn w-100 d-flex align-items-center justify-content-center gap-2 border bh-form-control"
              onclick="BH.Auth.login('test@test.com','pass');window.location.href='index.html'">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                <path fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
              </svg>
              Sign up with Google
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    function togglePwd(btn) {
      var input = btn.parentElement.querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.innerHTML = input.type === 'password' ? '<i class="bi bi-eye text-muted"></i>' : '<i class="bi bi-eye-slash text-muted"></i>';
    }

    function calculateStrength(password) {
      var strength = 0;
      if (password.length >= 8) strength += 1;
      if (password.length >= 12) strength += 1;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 1;
      if (/\d/.test(password)) strength += 1;
      if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
      return strength;
    }

    function updateStrengthMeter() {
      var pwd = document.getElementById('pwd').value;
      var strength = calculateStrength(pwd);
      var bar = document.getElementById('strengthBar');
      var text = document.getElementById('strengthText');

      var colors = ['bg-danger', 'bg-warning', 'bg-info', 'bg-primary', 'bg-success'];
      var labels = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
      var widths = ['20%', '40%', '60%', '80%', '100%'];

      if (pwd.length === 0) {
        bar.style.width = '0%';
        bar.className = 'progress-bar';
        text.textContent = 'Password strength';
        text.className = 'text-xs text-muted mt-1 mb-0';
        return;
      }

      var index = Math.min(strength, 4);
      bar.style.width = widths[index];
      bar.className = 'progress-bar ' + colors[index];
      text.textContent = labels[index];
      text.className = 'text-xs mt-1 mb-0 text-' + (index < 2 ? 'danger' : index < 4 ? 'warning' : 'success');
    }

    function updateMatchIndicator() {
      var pwd = document.getElementById('pwd').value;
      var cpwd = document.getElementById('cpwd').value;
      var matchText = document.getElementById('matchText');

      if (cpwd.length === 0) {
        matchText.textContent = '';
        return;
      }

      if (pwd === cpwd) {
        matchText.innerHTML = '<i class="bi bi-check-circle-fill text-success me-1"></i>Passwords match';
        matchText.className = 'text-xs mt-1 mb-0 text-success';
      } else {
        matchText.innerHTML = '<i class="bi bi-x-circle-fill text-danger me-1"></i>Passwords do not match';
        matchText.className = 'text-xs mt-1 mb-0 text-danger';
      }
    }

    function handleRegister() {
      var pwd = document.getElementById('pwd').value;
      var cpwd = document.getElementById('cpwd').value;
      var email = document.getElementById('email').value;
      if (pwd !== cpwd) { BH.showToast('Passwords do not match', 'error'); return; }
      if (pwd.length < 8) { BH.showToast('Password must be at least 8 characters', 'error'); return; }
      localStorage.setItem('BuyerHub-pending-email', email);
      localStorage.setItem('BuyerHub-pending-identifier', email);
      BH.Auth.register({
        firstName: document.getElementById('fn').value,
        lastName: document.getElementById('ln').value,
        email: email,
        password: pwd
      });
      window.location.href = 'registration-success.html';
    }

    document.addEventListener('DOMContentLoaded', function () {
      BH.init();
      document.getElementById('pwd').addEventListener('input', updateStrengthMeter);
      document.getElementById('cpwd').addEventListener('input', updateMatchIndicator);
      document.getElementById('pwd').addEventListener('input', updateMatchIndicator);
    });
  </script>
</body>

</html>
