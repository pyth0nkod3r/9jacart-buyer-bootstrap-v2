<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- SEO meta (P0-A5) -->

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BuyerHub">
  <meta property="og:title" content="Today's Deals | BuyerHub">
  <meta property="og:description" content="Today's best deals on BuyerHub. Save big on electronics, fashion, home goods, and more — for a limited time.">
  <meta property="og:url" content="https://www.buyerhub.com/deals.html">
  <meta property="og:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Today's Deals | BuyerHub">
  <meta name="twitter:description" content="Today's best deals on BuyerHub. Save big on electronics, fashion, home goods, and more — for a limited time.">
  <meta name="twitter:image" content="https://www.buyerhub.com/img/buyerhub-icon.svg">
  <!-- /SEO meta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="bh-header"></div>
  <div id="bh-secondary-nav"></div>
  <main class="bh-page py-4 py-lg-6">
    <div class="bh-container px-3 px-lg-4">
      <nav class="mb-3"><ol class="breadcrumb bh-breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Today's Deals</li></ol></nav>
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="bh-section-header"><h2>Today's Deals</h2><p>Explore products with remarkable discounts</p></div>
        <div class="d-flex align-items-center gap-2">
          <span class="text-sm text-muted">Ends in:</span>
          <span class="badge bg-danger" id="countdown">12:00:00</span>
        </div>
      </div>
      <div class="row g-3 g-lg-4" id="dealsGrid"></div>
    </div>
  </main>
  <div id="bh-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BH.initPage({ page: 'deals', activeDeals: true });
      var deals = BH.products.filter(function(p) { return p.price && p.price.discount && p.price.discount.percentage > 0; });
      document.getElementById('dealsGrid').innerHTML = deals.map(function(p) {
        return '<div class="col-6 col-sm-6 col-md-3 col-lg-3">' + BH.renderProductCard(p) + '</div>';
      }).join('');
      // Countdown timer
      var end = new Date(); end.setHours(23,59,59,999);
      function updateCountdown() {
        var now = new Date();
        var diff = Math.max(0, end - now);
        var h = Math.floor(diff/3600000); diff %= 3600000;
        var m = Math.floor(diff/60000); diff %= 60000;
        var s = Math.floor(diff/1000);
        document.getElementById('countdown').textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
    });
  </script>
</body>
</html>
